  - id: T-006
    status: completed
    type: feat
    title: Event deduplication, transaction upsert pipeline, and category rules seeder
    depends_on: ["T-005"]
    goal: Add deterministic fingerprint dedupe, idempotent transaction creation from notification events, and a rule-based category matching seeder so transactions receive a default category at ingest time.
    non_goals:
      - AI auto-categorization model
      - Bulk historical transaction import
      - Currency conversion engine
    context_files:
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/spec.md
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/acceptance.json
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/architecture.md
    files_expected:
