      - backend/src/CoupleSync.Domain/Events/
      - backend/src/CoupleSync.Infrastructure/Persistence/Migrations/
      - backend/src/CoupleSync.Infrastructure/Persistence/Seeders/CategoryRulesSeeder.cs
      - backend/src/CoupleSync.Infrastructure/Persistence/Seeders/category-rules.json # keyword-to-category dictionary (e.g. UBER->Transporte, MERCADO LIVRE->Compras, IFOOD->Alimentacao)
    acceptance_checks:
      - manual: AC-003 repeated equivalent events create one transaction only
      - manual: AC-003 persisted transaction has category assigned by matching a keyword from category-rules.json
      - manual: AC-003 transaction with no keyword match is assigned category OUTROS as default fallback
      - manual: CategoryRulesSeeder is invoked at app startup or via migration and is idempotent
    risk_flags:
      - perf
    done_when:
      - Fingerprint uniqueness is enforced per couple scope
      - Transaction upsert is idempotent under retries
      - Category rules seeder provides a minimum of 20 keyword-to-category mappings covering Alimentacao, Transporte, Compras, Saude, Lazer, Moradia
      - Unmatched transactions default to OUTROS category
      - Meets AC-003 references
    context_window: Requires validated ingest payloads from T-005 and transaction schema scaffolding. CategoryRulesSeeder must be idempotent and load from category-rules.json at startup.

