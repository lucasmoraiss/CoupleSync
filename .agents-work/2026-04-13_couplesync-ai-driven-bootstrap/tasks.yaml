    non_goals:
      - Social login providers
      - Multi-factor authentication
      - iOS-specific auth UX
    context_files:
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/spec.md
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/acceptance.json
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/architecture.md
    files_expected:
      - backend/src/CoupleSync.Api/Controllers/AuthController.cs
      - backend/src/CoupleSync.Application/Auth/
      - backend/src/CoupleSync.Infrastructure/Security/
    acceptance_checks:
      - manual: AC-001 register and login return valid tokens and user profile
      - manual: AC-008 token claims include user_id and couple scope for authorization
      - manual: AC-002 security review confirms no raw banking credentials in auth payloads
    risk_flags:
      - security
    done_when:
