      - breaking-change
    done_when:
      - Authorization policy enforces derived couple_id from JWT
      - Repository queries are couple-filtered by default
      - Meets AC-008 references
    context_window: Builds on T-001 and T-002 outputs; coder needs claim model and couple membership checks already in place.

  - id: T-003-B
    status: completed
    type: feat
    title: EF Core global query filter infrastructure for couple-scoped tenant isolation
    depends_on: ["T-003"]
    goal: Inject ICoupleContext into AppDbContext and establish the HasQueryFilter pattern so all future couple-scoped entities automatically filter by couple_id at query time, preventing cross-couple data leaks without requiring per-query WHERE clauses.
    non_goals:
      - Applying filters to existing entities (User, Couple, RefreshToken are not couple-scoped tenants)
      - Row-level security at database engine level
      - Modifying financial entity schemas (those come in T-005+)
    context_files:
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/spec.md
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/architecture.md
      - .agents-work/2026-04-13_couplesync-ai-driven-bootstrap/tasks.yaml
    files_expected:
      - backend/src/CoupleSync.Application/Common/Interfaces/ICoupleScoped.cs
      - backend/src/CoupleSync.Infrastructure/Persistence/AppDbContext.cs
    acceptance_checks:
      - manual: AppDbContext constructor accepts ICoupleContext (nullable for migration/design-time safety)
      - manual: ICoupleScoped interface defines CoupleId property for all future couple-scoped entities
      - manual: AppDbContext.ApplyCoupleQueryFilters() applies HasQueryFilter on all ICoupleScoped entities
      - manual: dotnet build 0 errors; dotnet test >= 43 tests passing
    risk_flags:
      - security
    done_when:
      - AppDbContext receives ICoupleContext and exposes a CurrentCoupleId property for query filters
      - ICoupleScoped interface established for future entities
      - All existing tests still pass (no regression)
      - Pattern is self-documenting so T-005 coder knows exactly how to add their entity filter
    context_window: Prerequisite for T-005. ICoupleContext and HttpContextCoupleContext already implemented in T-003. AppDbContext currently has no ICoupleContext dependency.

