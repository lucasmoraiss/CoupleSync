      - backend/src/CoupleSync.Application/Couple/
      - backend/src/CoupleSync.Domain/Entities/Couple.cs
      - backend/src/CoupleSync.Infrastructure/Migrations/ # EF migration for Couples and updated Users tables must be generated
    acceptance_checks:
      - manual: AC-001 two users can pair through one join code and share workspace metadata
      - manual: AC-008 join operations enforce authenticated user context and membership ownership
      - manual: EF migration for Couple entity is generated and applied (dotnet ef migrations add AddCouple)
      - manual: couple_id column is present in Users table after migration update
