  - id: T-600
    status: implemented
    type: fix
    title: "P0 — Fix OCR multipart boundary + Docker uploads dir permissions + docker-compose env vars"
    depends_on: []
    goal: >
      Fix the three production blockers that prevent OCR from working in any environment:
      (1) Remove the manual Content-Type header override in mobile ocrApiClient so React Native
      auto-sets the multipart/form-data boundary.
      (2) Add mkdir + chown for /app/uploads in Dockerfile so appuser can write uploaded files.
      (3) Ensure docker-compose.yml exposes all required env vars (USE_LOCAL_PDF_PARSER, etc.)
      so the container starts correctly.
    non_goals:
      - "Implementing the local PDF parser (T-620+)"
      - "Any UX changes"
    context_files:
      - ".agents-work/2026-04-17_v16-bugfixes-bank-import-ux/spec.md"
      - ".agents-work/2026-04-17_v16-bugfixes-bank-import-ux/architecture.md"
    files_expected:
      - "mobile/src/services/apiClient.ts"
      - "backend/Dockerfile"
      - "docker-compose.yml"
    acceptance_checks:
      - "cmd: grep -n 'Content-Type' mobile/src/services/apiClient.ts (must NOT show multipart/form-data manual override in OCR upload call)"
      - "cmd: grep -n 'chown appuser' backend/Dockerfile (must return a line after RUN mkdir -p /app/uploads)"
      - "cmd: docker build -t couplesync-api ./backend (must succeed)"
      - "manual: docker run couplesync-api and verify /app/uploads is owned by appuser via 'docker exec ... ls -la /app/'"
      - "manual: upload a PDF from mobile dev environment; backend logs show 'File received: <filename>', not '400 FILE_REQUIRED'"
    risk_flags:
      - "breaking-change (mobile upload function signature unchanged; only header removed)"
    done_when:
      - "Manual Content-Type header for OCR upload removed from apiClient.ts"
      - "Dockerfile contains RUN mkdir -p /app/uploads && chown appuser:appgroup /app/uploads before USER appuser"
      - "docker build succeeds"
      - "Meets AC-601, AC-602"

