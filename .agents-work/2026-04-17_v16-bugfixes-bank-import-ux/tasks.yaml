      (4) BankDetector.Detect(text) — throws BankFormatUnknownException on unknown bank (EC-003).
      (5) parser.Parse(text) → IReadOnlyList<ParsedTransaction>.
      (6) If count == 0 → throw NoTransactionsFoundException (EC-003 variant).
      (7) Build ParsedBankStatement and serialize to JSON with discriminator "provider":"local-pdf".
      Log only: transaction count + detected bank name (NFR-004).
    non_goals:
