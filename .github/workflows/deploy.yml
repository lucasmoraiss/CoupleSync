name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: couplesyncapi

jobs:
  deploy:
    name: Build & Deploy to App Service
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish backend/src/CoupleSync.Api/CoupleSync.Api.csproj \
            --configuration Release \
            --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish

      - name: Wait for health endpoint
        run: |
          URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          echo "Polling: ${URL}"
          for i in $(seq 1 20); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${URL}" || echo "000")
            if [ "${STATUS}" = "200" ]; then
              echo "Health check passed (HTTP ${STATUS}) on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${STATUS} — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 20 attempts"
          exit 1
