name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/CoupleSync.sln

      - name: Build
        run: dotnet build backend/CoupleSync.sln --no-restore --configuration Release

      - name: Test — Unit
        run: >
          dotnet test backend/tests/CoupleSync.UnitTests/CoupleSync.UnitTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"

      - name: Test — Integration
        run: >
          dotnet test backend/tests/CoupleSync.IntegrationTests/CoupleSync.IntegrationTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"

      - name: Test — E2E
        run: >
          dotnet test backend/tests/CoupleSync.E2ETests/CoupleSync.E2ETests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=e2e-results.trx"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Mobile type-check
        run: |
          cd mobile
          npm ci
          npx tsc --noEmit

      - name: Secret scan
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified

      - name: Validate Docker build
        run: docker build --file backend/Dockerfile --tag couplesync-api:ci-check backend/
