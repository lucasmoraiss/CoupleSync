name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: couplesync_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "Host=localhost;Port=5432;Database=couplesync_test;Username=postgres;Password=postgres"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/CoupleSync.sln

      - name: Build
        run: dotnet build backend/CoupleSync.sln --no-restore --configuration Release

      - name: Apply migrations
        run: |
          dotnet tool install -g dotnet-ef
          cd backend
          dotnet ef database update -p src/CoupleSync.Infrastructure/CoupleSync.Infrastructure.csproj -s src/CoupleSync.Api/CoupleSync.Api.csproj

      - name: Test — Unit
        run: >
          dotnet test backend/tests/CoupleSync.UnitTests/CoupleSync.UnitTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/tests/CoupleSync.UnitTests/TestResults/*.trx

      - name: Test — Integration
        run: >
          dotnet test backend/tests/CoupleSync.IntegrationTests/CoupleSync.IntegrationTests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: backend/tests/CoupleSync.IntegrationTests/TestResults/*.trx

      - name: Test — E2E
        run: >
          dotnet test backend/tests/CoupleSync.E2ETests/CoupleSync.E2ETests.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=e2e-results.trx"

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: backend/tests/CoupleSync.E2ETests/TestResults/*.trx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Mobile — install dependencies
        working-directory: mobile
        run: npm ci

      - name: Expo Doctor
        working-directory: mobile
        run: npx expo-doctor
        continue-on-error: true   # informational only — don't fail PRs yet

      - name: Mobile type-check
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Validate Docker build
        run: docker build --file backend/Dockerfile --tag couplesync-api:ci-check backend/
