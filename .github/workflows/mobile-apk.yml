name: Mobile APK — Build & Distribute

# AC-106: triggered on manual dispatch or version tag push from main
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Minimal permissions — no write access required
permissions:
  contents: read

jobs:
  build-and-distribute:
    name: EAS Build → Firebase App Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup EAS CLI
        run: npm install --global eas-cli@12

      # EXPO_TOKEN authenticates the EAS CLI against the Expo account.
      # EXPO_PUBLIC_API_BASE_URL is set in eas.json preview.env and baked into
      # the APK at EAS cloud build time — not injected from the runner env.
      - name: EAS Build — Android APK (preview)
        id: eas-build
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_OUTPUT=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json)
          BUILD_ID=$(echo "${BUILD_OUTPUT}" | jq -r '.[0].id // .id // empty')
          if [ -z "${BUILD_ID}" ]; then
            echo "::error::Could not parse build ID from EAS build output."
            exit 1
          fi
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"

      # Retrieve the download URL using the exact build ID to avoid race conditions
      - name: Retrieve APK download URL from EAS
        id: get-apk
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          APK_URL=$(eas build:view \
            "${{ steps.eas-build.outputs.build_id }}" \
            --json \
            | jq -r '.artifacts.buildUrl')

          if [ -z "${APK_URL}" ] || [ "${APK_URL}" = "null" ]; then
            echo "::error::Could not retrieve APK URL from EAS build."
            exit 1
          fi

          echo "apk_url=${APK_URL}" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        run: curl -fsSL -o app-preview.apk "${{ steps.get-apk.outputs.apk_url }}"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@13

      # Upload to Firebase App Distribution.
      # If FIREBASE_TESTER_GROUP is unset or empty the step emits a workflow
      # warning but continues — it does NOT fail the build.
      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TESTER_GROUP: ${{ secrets.FIREBASE_TESTER_GROUP }}
        run: |
          if [ -n "${FIREBASE_TESTER_GROUP}" ]; then
            firebase appdistribution:distribute app-preview.apk \
              --app "${FIREBASE_APP_ID}" \
              --groups "${FIREBASE_TESTER_GROUP}"
          else
            echo "::warning::FIREBASE_TESTER_GROUP secret is empty or unset — APK will be uploaded without assigning a tester group."
            firebase appdistribution:distribute app-preview.apk \
              --app "${FIREBASE_APP_ID}"
          fi
